services:
  # MySQL 数据库
  mysql:
    build:
      context: ./sql
      dockerfile: Dockerfile
    container_name: food-delivery-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:root123456}
      MYSQL_DATABASE: ${MYSQL_DATABASE:food_delivery}
      MYSQL_USER: ${MYSQL_USER:fooduser}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:foodpass123}
      TZ: Asia/Shanghai
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test:
        [
          "CMD",
          "mysqladmin",
          "ping",
          "-h",
          "localhost",
          "-u",
          "root",
          "-p$$MYSQL_ROOT_PASSWORD",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - food-network

  # 后端服务
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      platforms:
        - linux/amd64
        - linux/arm64
    container_name: food-delivery-backend
    restart: unless-stopped
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/${MYSQL_DATABASE:food_delivery}?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai
      SPRING_DATASOURCE_USERNAME: ${SPRING_DATASOURCE_USERNAME:root}
      SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD:root123456}
      JWT_SECRET: ${JWT_SECRET:food-delivery-secret-key-must-be-at-least-256-bits-long-for-hs256}
      JWT_EXPIRATION: ${JWT_EXPIRATION:86400000}
      FILE_UPLOAD_PATH: /app/uploads/
      TZ: Asia/Shanghai
    ports:
      - "8080:8080"
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - food-network

  # 前端服务
  frontend-user:
    build:
      context: ./frontend-user
      dockerfile: Dockerfile
      platforms:
        - linux/amd64
        - linux/arm64
    container_name: food-delivery-frontend
    restart: unless-stopped
    ports:
      - "8081:80"
    depends_on:
      - backend
      - static-server
    networks:
      - food-network

  # 静态资源服务
  static-server:
    build:
      context: ./static-server
      dockerfile: Dockerfile
    container_name: food-delivery-static
    restart: unless-stopped
    ports:
      - "9000:9000"
    networks:
      - food-network

volumes:
  mysql_data:
  uploads_data:

networks:
  food-network:
    driver: bridge
